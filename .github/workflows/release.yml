name: Build and Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "릴리즈 버전 (예: 1.0.0)"
        required: true
        default: "1.0.0"
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Validate release version
        shell: pwsh
        run: |
          $package = Get-Content package.json | ConvertFrom-Json
          if ($package.version -ne "${{ inputs.version }}") {
            throw "package.json version ($($package.version)) does not match workflow input (${{ inputs.version }})."
          }
          $pyproject = Get-Content pyproject.toml -Raw
          if ($pyproject -notmatch 'version = "${{ inputs.version }}"') {
            throw "pyproject.toml version does not match workflow input (${{ inputs.version }})."
          }

      - name: Build project
        run: npm run build

      - name: Package VSIX
        run: npx @vscode/vsce package --no-dependencies --allow-missing-repository --out PyDebugBridge-v${{ inputs.version }}.vsix

      - name: Install Python build tools
        run: python -m pip install --upgrade pip build pyinstaller

      - name: Build Python package
        shell: pwsh
        run: |
          python -m build --outdir python-dist
          Rename-Item "python-dist\pydebug_mcp-${{ inputs.version }}.tar.gz" "PyDebugMCP-v${{ inputs.version }}.tar.gz"
          Rename-Item "python-dist\pydebug_mcp-${{ inputs.version }}-py3-none-any.whl" "PyDebugMCP-v${{ inputs.version }}-py3-none-any.whl"

      - name: Build PyInstaller exe
        shell: pwsh
        run: |
          @'
          from PyDebugMCP.__main__ import main

          if __name__ == "__main__":
              main()
          '@ | Set-Content -Path build_entry.py -Encoding utf8

          pyinstaller --noconfirm --clean --onefile `
            --name "PyDebugMCP_v${{ inputs.version }}" `
            --distpath pyinstaller-dist `
            --workpath pyinstaller-build `
            --specpath pyinstaller-spec `
            build_entry.py

      - name: Generate checksums
        shell: pwsh
        run: |
          $files = @(
            "PyDebugBridge-v${{ inputs.version }}.vsix",
            "PyDebugMCP-v${{ inputs.version }}.tar.gz",
            "PyDebugMCP-v${{ inputs.version }}-py3-none-any.whl",
            "pyinstaller-dist\PyDebugMCP_v${{ inputs.version }}.exe"
          )
          $hashes = foreach ($file in $files) {
            $hash = (Get-FileHash $file -Algorithm SHA256).Hash.ToLower()
            "$hash  $file"
          }
          Set-Content -Path "SHA256SUMS.txt" -Value $hashes

      - name: Create tag
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag v${{ inputs.version }} ${{ github.sha }}
          git push origin v${{ inputs.version }}

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          name: v${{ inputs.version }}
          draft: true
          files: |
            PyDebugBridge-v${{ inputs.version }}.vsix
            PyDebugMCP-v${{ inputs.version }}.tar.gz
            PyDebugMCP-v${{ inputs.version }}-py3-none-any.whl
            pyinstaller-dist/PyDebugMCP_v${{ inputs.version }}.exe
            SHA256SUMS.txt
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
